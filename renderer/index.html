<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quick Look 3D</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1c1c1e;
      }
      #app {
        width: 100vw;
        height: 100vh;
      }
      canvas {
        display: block;
      }
      /* loading / error overlay */
      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        color: rgba(255, 255, 255, 0.7);
        font-size: 13px;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }
      #overlay.hidden {
        opacity: 0;
      }
      .spinner {
        width: 28px;
        height: 28px;
        border: 3px solid rgba(255, 255, 255, 0.15);
        border-top-color: rgba(255, 255, 255, 0.7);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      #overlay.error .spinner {
        display: none;
      }
      #overlay.error {
        color: #ff6b6b;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      /* model info panel */
      #info-panel {
        position: fixed;
        top: 12px;
        left: 12px;
        width: 234px;
        max-height: calc(100% - 24px);
        overflow-y: auto;
        box-sizing: border-box;
        background: rgba(28, 28, 30, 0.82);
        border: 0.5px solid rgba(255, 255, 255, 0.12);
        border-radius: 10px;
        padding: 11px 12px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: rgba(255, 255, 255, 0.85);
        font-size: 12px;
        line-height: 1.4;
        transition: opacity 0.2s ease;
        user-select: none;
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 255, 255, 0.25) transparent;
      }
      #info-panel.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #info-header {
        display: flex;
        align-items: center;
        gap: 7px;
        margin-bottom: 8px;
      }
      #info-header .info-title {
        font-weight: 500;
        color: rgba(255, 255, 255, 0.92);
        font-size: 12.5px;
      }
      #info-header .info-hint {
        margin-left: auto;
        color: rgba(255, 255, 255, 0.45);
        font-size: 10.5px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 4px;
        padding: 0 5px;
      }
      .info-section {
        color: rgba(255, 255, 255, 0.42);
        font-size: 10.5px;
        letter-spacing: 0.04em;
        margin: 9px 0 4px;
      }
      .info-section:first-child {
        margin-top: 0;
      }
      .info-row {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        padding: 2px 0;
      }
      .info-row .k {
        color: rgba(255, 255, 255, 0.55);
        white-space: nowrap;
      }
      .info-row .v {
        text-align: right;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="overlay">
      <div class="spinner"></div>
      <div id="overlay-text">Loading…</div>
    </div>
    <div id="info-panel" class="hidden">
      <div id="info-header">
        <span class="info-title">Model info</span>
        <span class="info-hint">i</span>
      </div>
      <div id="info-body"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
